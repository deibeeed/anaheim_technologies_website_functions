name: ci-deploy-functions

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Lint
        working-directory: functions
        run: npm run lint

      - name: Build (TypeScript)
        working-directory: functions
        run: npm run build

      # Deploy on push to master or manual trigger only
      - name: Authenticate to Google Cloud
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANAHEIM_TECHNOLOGIES }}

      - name: Install Firebase CLI
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Functions
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: firebase deploy --only functions --project anaheim-technologies --non-interactive --force
